name: pink contribution snake

on:
schedule:
- cron: "0 0 * * *"
workflow_dispatch:

permissions:
contents: write

jobs:
build:
runs-on: ubuntu-latest

```
steps:
  - uses: actions/checkout@v3

  - uses: Platane/snk@v3
    with:
      github_user_name: aura384
      outputs: |
        dist/github-contribution-grid-snake.svg?palette=github-light&color_snake=ff8fab&color_dots=ffd6e0,ffb3c6,ff85a1
        dist/github-contribution-grid-snake.gif?palette=github-light&color_snake=ff8fab&color_dots=ffd6e0,ffb3c6,ff85a1

  - uses: crazy-max/ghaction-github-pages@v3
    with:
      target_branch: output
      build_dir: dist
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
```
